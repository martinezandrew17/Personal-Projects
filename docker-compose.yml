version: "3.9"

services:

  # ── 1. PostgreSQL database ──────────────────────────────────────────────────
  db:
    image: postgres:16          # pulled from Docker Hub, no Dockerfile needed
    environment:
      POSTGRES_DB:       findb
      POSTGRES_USER:     finuser
      POSTGRES_PASSWORD: yourpassword
    ports:
      - "5432:5432"             # lets you connect with DBeaver/pgAdmin locally
    volumes:
      - pgdata:/var/lib/postgresql/data   # data survives container restarts
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql  # auto-runs on first boot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finuser -d findb"]
      interval: 5s
      retries: 5

  # ── 2. Ingestion fetcher ────────────────────────────────────────────────────
  fetcher:
    build: .                    # uses YOUR Dockerfile
    command: python -m ingestion.fetch_market_data
    env_file: .env
    depends_on:
      db:
        condition: service_healthy   # waits for postgres to be ready
    restart: unless-stopped     # auto-restarts if it crashes

  # ── 3. Streamlit dashboard ──────────────────────────────────────────────────
  dashboard:
    build: .                    # same Dockerfile, different command
    command: streamlit run app/dashboard.py --server.port 8501
    env_file: .env
    ports:
      - "8501:8501"             # http://localhost:8501 in your browser
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:                       # named volume — persists your data